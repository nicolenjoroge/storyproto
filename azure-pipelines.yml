trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  - group: AZURE_STATIC_WEB_APPS_API_TOKEN  # Variable group in Azure DevOps Library containing AZURE_STATIC_WEB_APPS_API_TOKEN

stages:
  # -------------------------------------------------------
  # Stage 1: Build & Deploy  (push to main OR open/sync PR)
  # -------------------------------------------------------
  - stage: BuildAndDeploy
    displayName: 'Build and Deploy'
    condition: |
      or(
        eq(variables['Build.Reason'], 'IndividualCI'),
        eq(variables['Build.Reason'], 'BatchedCI'),
        eq(variables['Build.Reason'], 'PullRequest')
      )
    jobs:
      - job: BuildAndDeployJob
        displayName: 'Build and Deploy Job'
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            submodules: true
            lfs: false

          # Inject runtime environment config
          - script: |
              echo "window.CONTENT_BASE_URL = 'https://bpmstoryhub.blob.core.windows.net';" > js/env.js
            displayName: 'Set production env'

          # Deploy to Azure Static Web Apps
          - task: AzureStaticWebApp@0
            displayName: 'Build and Deploy to Azure Static Web Apps'
            inputs:
              app_location: '/'
              api_location: ''
              output_location: '.'
              skip_app_build: true
              azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN)

  # -------------------------------------------------------
  # Stage 2: Close PR environment  (PR closed/merged only)
  # -------------------------------------------------------
  - stage: ClosePullRequest
    displayName: 'Close Pull Request Environment'
    dependsOn: []
    condition: |
      and(
        eq(variables['Build.Reason'], 'PullRequest'),
        or(
          eq(variables['System.PullRequest.IsMerged'], 'True'),
          eq(variables['Build.SourceBranch'], 'refs/heads/main')
        )
      )
    jobs:
      - job: ClosePRJob
        displayName: 'Close Pull Request Job'
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: AzureStaticWebApp@0
            displayName: 'Close Pull Request (teardown preview env)'
            inputs:
              action: 'close'
              azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN)