[extend]
useDefault = true

[[allowlist.regexes]]
# Allow the blob storage URL in env.js — it's not a secret
description = "Blob Storage URL"
regex = '''blob\.core\.windows\.net'''

[[allowlist.regexes]]
# Allow base64 SVG data URIs in campaign-loader.js
description = "Base64 SVG data URI"
regex = '''data:image/svg\+xml;base64'''

[[allowlist.paths]]
# Ignore the workflow file itself which references secret names
description = "GitHub Actions workflow"
regex = '''\.github/workflows/.*\.yml'''